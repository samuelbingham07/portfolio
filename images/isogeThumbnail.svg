<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f5f0e8"/>
  <!-- metro lines -->
  <!-- blue line horizontal top -->
  <line x1="60" y1="90" x2="340" y2="90" stroke="#2255cc" stroke-width="10" stroke-linecap="round"/>
  <!-- yellow line diagonal -->
  <line x1="100" y1="90" x2="160" y2="175" stroke="#e6b800" stroke-width="10" stroke-linecap="round"/>
  <!-- green line left vertical -->
  <line x1="80" y1="160" x2="80" y2="310" stroke="#22aa44" stroke-width="10" stroke-linecap="round"/>
  <!-- red line big oval -->
  <ellipse cx="240" cy="255" rx="110" ry="90" fill="none" stroke="#cc2222" stroke-width="10"/>
  <!-- orange line bottom -->
  <line x1="80" y1="310" x2="340" y2="310" stroke="#e67322" stroke-width="10" stroke-linecap="round"/>
  <!-- stations (circles) -->
  <circle cx="100" cy="90" r="9" fill="white" stroke="#2255cc" stroke-width="3"/>
  <circle cx="220" cy="90" r="9" fill="white" stroke="#2255cc" stroke-width="3"/>
  <circle cx="320" cy="90" r="9" fill="white" stroke="#2255cc" stroke-width="3"/>
  <circle cx="160" cy="175" r="9" fill="white" stroke="#e6b800" stroke-width="3"/>
  <circle cx="80" cy="220" r="9" fill="white" stroke="#22aa44" stroke-width="3"/>
  <circle cx="80" cy="310" r="9" fill="white" stroke="#22aa44" stroke-width="3"/>
  <circle cx="240" cy="310" r="9" fill="white" stroke="#e67322" stroke-width="3"/>
  <circle cx="340" cy="255" r="9" fill="white" stroke="#cc2222" stroke-width="3"/>
  <!-- magnetic train token -->
  <rect x="190" y="82" width="20" height="16" rx="4" fill="#2255cc"/>
  <rect x="193" y="85" width="14" height="8" rx="2" fill="white" opacity="0.6"/>
  <!-- title area -->
  <rect x="0" y="335" width="400" height="65" fill="#2255cc"/>
  <text x="200" y="362" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="white" text-anchor="middle" letter-spacing="6">ISOGE</text>
  <text x="200" y="382" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="2">急げ — A JAPAN METRO GAME</text>
</svg>
