<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#252240"/>
  <!-- moon glow -->
  <circle cx="200" cy="90" r="55" fill="rgba(180,170,255,0.12)"/>
  <circle cx="200" cy="90" r="36" fill="rgba(200,190,255,0.18)"/>
  <circle cx="200" cy="90" r="22" fill="rgba(220,215,255,0.22)"/>
  <!-- manor silhouette -->
  <!-- main body -->
  <rect x="120" y="200" width="160" height="130" fill="#1a1830"/>
  <!-- left tower -->
  <rect x="90" y="185" width="50" height="145" fill="#1a1830"/>
  <polygon points="90,185 115,150 140,185" fill="#1a1830"/>
  <!-- right tower -->
  <rect x="260" y="185" width="50" height="145" fill="#1a1830"/>
  <polygon points="260,185 285,150 310,185" fill="#1a1830"/>
  <!-- center peak -->
  <polygon points="155,200 200,165 245,200" fill="#1a1830"/>
  <!-- windows (glowing) -->
  <rect x="106" y="210" width="18" height="22" rx="9" fill="rgba(255,220,80,0.5)"/>
  <rect x="276" y="210" width="18" height="22" rx="9" fill="rgba(255,220,80,0.5)"/>
  <rect x="148" y="222" width="18" height="22" rx="9" fill="rgba(255,220,80,0.35)"/>
  <rect x="234" y="222" width="18" height="22" rx="9" fill="rgba(255,220,80,0.35)"/>
  <!-- door -->
  <rect x="185" y="280" width="30" height="50" rx="15" fill="rgba(255,200,60,0.3)"/>
  <!-- ground -->
  <rect x="0" y="330" width="400" height="70" fill="#1a1830"/>
  <!-- stairs -->
  <rect x="175" y="325" width="50" height="8" rx="2" fill="#252240"/>
  <rect x="165" y="318" width="70" height="8" rx="2" fill="#252240"/>
  <!-- title -->
  <text x="200" y="370" font-family="Georgia, serif" font-weight="700" font-size="13" fill="rgba(220,215,255,0.9)" text-anchor="middle" letter-spacing="2">HAUNTING OF THE</text>
  <text x="200" y="388" font-family="Georgia, serif" font-weight="700" font-size="11" fill="rgba(180,170,230,0.7)" text-anchor="middle" letter-spacing="1">WHITCOMB MANOR</text>
</svg>
